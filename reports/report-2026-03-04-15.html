      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-xhs-red to-xhs-pink flex items-center justify-center text-white font-bold text-sm">🔥</div>
          <div>
            <h1 class="text-base font-bold text-xhs-text">涅磐纪日报</h1>
            <p class="text-xs text-xhs-subtext">小红书数据特辑</p>
          </div>
        </a>
      </div>
      <div class="flex items-center gap-3">
        <span class="px-3 py-1 bg-red-50 text-xhs-red text-xs rounded-full border border-red-100">小红书数据源</span>
        <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-gray-50">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-6">
    <!-- Header Section -->
    <section class="mb-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
        <div class="flex items-center justify-between mb-4">
          <div>
            <h2 class="text-xs text-xhs-subtext uppercase tracking-wide mb-1">日报编号</h2>
            <p class="text-2xl font-bold text-xhs-red" id="report-id">--</p>
          </div>
          <div class="text-right">
            <p class="text-xs text-xhs-subtext mb-1">更新时间</p>
            <p class="text-sm font-medium" id="report-time">--</p>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="stat-card">
            <p class="text-xs opacity-80 mb-1">总笔记数</p>
            <p class="text-3xl font-bold" id="total-notes">0</p>
          </div>
          <div class="bg-white border-2 border-red-100 rounded-xl p-3">
            <p class="text-xs text-xhs-subtext mb-1">AI电商</p>
            <p class="text-2xl font-bold text-xhs-red" id="ai-commerce">0</p>
          </div>
          <div class="bg-white border-2 border-pink-100 rounded-xl p-3">
            <p class="text-xs text-xhs-subtext mb-1">装饰画</p>
            <p class="text-2xl font-bold text-pink-500" id="decorative-art">0</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Hot Topics Section -->
    <section class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-1 h-6 bg-xhs-red rounded-full"></span>
        <h2 class="text-lg font-bold text-xhs-text">🔥 热门话题</h2>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="hot-topics">
        <!-- Dynamic topics will be inserted here -->
      </div>
    </section>

    <!-- XHS Notes Grid -->
    <section class="mb-6">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2">
          <span class="w-1 h-6 bg-xhs-red rounded-full"></span>
          <h2 class="text-lg font-bold text-xhs-text">📕 小红书笔记</h2>
          <span class="px-2 py-0.5 bg-red-50 text-xhs-red text-xs rounded" id="xhs-count">0 条</span>
        </div>
        <div class="flex gap-2">
          <button onclick="filterCategory('all')" class="px-3 py-1 bg-xhs-red text-white text-xs rounded-full">全部</button>
          <button onclick="filterCategory('AI电商')" class="px-3 py-1 bg-gray-100 text-gray-600 text-xs rounded-full hover:bg-red-50">AI电商</button>
          <button onclick="filterCategory('装饰画')" class="px-3 py-1 bg-gray-100 text-gray-600 text-xs rounded-full hover:bg-red-50">装饰画</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="notes-grid">
        <!-- Notes will be dynamically inserted -->
      </div>
    </section>

    <!-- Exa News Section (for comparison) -->
    <section class="mb-6">
      <div class="flex items-center gap-2 mb-4">
        <span class="w-1 h-6 bg-blue-500 rounded-full"></span>
        <h2 class="text-lg font-bold text-xhs-text">🌐 全网趋势</h2>
        <span class="px-2 py-0.5 bg-blue-50 text-blue-600 text-xs rounded" id="exa-count">0 条</span>
      </div>
      <div class="space-y-3" id="exa-news">
        <!-- Exa news will be inserted -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="border-t border-gray-200 pt-6 pb-8 mt-8 text-center text-xs text-gray-500">
      <p>© 2025 涅磐纪 AI电商日报 · 小红书数据整合</p>
      <p class="mt-1">数据来源：Exa 全网搜索 · 小红书公开笔记</p>
      <p class="mt-1">生成时间：<span id="generated-time">--</span></p>
    </footer>
  </main>

  <script>
    // Data will be set by Python injection script
    // Keep default empty values for initialization
    if (typeof reportData === 'undefined') {
      reportData = {
        meta: {
          totalNotes: 0,
          aiCommerce: 0,
          decorativeArt: 0,
          exaCount: 0,
          generatedAt: ''
        },
        xiaohongshu: [],
        exa: []
      };
    }

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    // Category filter
    function filterCategory(cat) {
      renderNotes();
    }

    // Format numbers with k/M
    function formatNumber(num) {
      if (num >= 10000) return (num/10000).toFixed(1) + 'w';
      if (num >= 1000) return (num/1000).toFixed(1) + 'k';
      return num.toString();
    }

    // Render XHS notes
    function renderNotes() {
      const grid = document.getElementById('notes-grid');
      const filter = document.querySelector('button.text-white')?.textContent || '全部';
      
      let notes = reportData.xiaohongshu;
      if (filter !== '全部') {
        // Simple category detection from title/content
        if (filter === 'AI电商') {
          notes = notes.filter(n => 
            n.title.includes('AI') && (n.title.includes('电商') || n.title.includes('运营') || n.title.includes('淘宝'))
          );
        } else if (filter === '装饰画') {
          notes = notes.filter(n =>
            n.title.includes('装饰画') || n.title.includes('画框') || n.title.includes('挂画')
          );
        }
      }

      grid.innerHTML = notes.map(note => `
        <div class="xhs-card overflow-hidden cursor-pointer">
          <div class="note-cover bg-gradient-to-br from-red-100 to-pink-100 flex items-center justify-center">
            <svg class="w-16 h-16 text-red-200" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
          </div>
          <div class="p-4">
            <h3 class="font-medium text-xhs-text mb-2 line-clamp-2 leading-snug">${note.title}</h3>
            <div class="flex items-center justify-between text-xs text-xhs-subtext mb-3">
              <span>@${note.user}</span>
              <div class="flex items-center gap-3">
                <span class="flex items-center gap-1">👍${formatNumber(parseInt(note.likes) || 0)}</span>
                <span class="flex items-center gap-1">💬${formatNumber(parseInt(note.comments) || 0)}</span>
              </div>
            </div>
            <div class="flex gap-2">
              <span class="xhs-tag">小红书</span>
              ${note.category === 'AI 电商趋势' ? '<span class="xhs-tag">AI电商</span>' : ''}
              ${note.category === '装饰画与墙艺' ? '<span class="xhs-tag">装饰画</span>' : ''}
            </div>
          </div>
        </div>
      `).join('');
    }

    // Render Exa news (compact)
    function renderExaNews() {
      const container = document.getElementById('exa-news');
      const news = reportData.exa.slice(0, 5);
      
      container.innerHTML = news.map(item => `
        <div class="bg-white rounded-xl p-4 border border-gray-100">
          <h4 class="font-medium text-xhs-text mb-2 line-clamp-2">
            <a href="${item.url}" target="_blank" class="hover:text-xhs-red transition-colors">${item.title}</a>
          </h4>
          <p class="text-xs text-xhs-subtext line-clamp-2 mb-2">${item.snippet}</p>
          <div class="flex items-center justify-between text-xs">
            <span class="text-xhs-subtext">${item.source || 'Exa'}</span>
            <a href="${item.url}" target="_blank" class="text-xhs-red">阅读原文 →</a>
          </div>
        </div>
      `).join('');
    }

    // Render hot topics
    function renderHotTopics() {
      const container = document.getElementById('hot-topics');
      const categories = {};
      
      reportData.xiaohongshu.forEach(note => {
        const cat = note.category || '其他';
        categories[cat] = (categories[cat] || 0) + 1;
      });
      
      const sorted = Object.entries(categories).sort((a,b) => b[1] - a[1]).slice(0, 4);
      
      container.innerHTML = sorted.map(([cat, count]) => `
        <div class="bg-white rounded-xl p-4 border border-gray-100 text-center">
          <p class="text-2xl font-bold text-xhs-red mb-1">${count}</p>
          <p class="text-xs text-xhs-subtext">${cat}</p>
        </div>
      `).join('');
    }

    // Initialize
    function init() {
      // 从 <script id="report-data"> 加载数据（可选，兼容旧版）
      const dataScript = document.getElementById('report-data');
      if (dataScript) {
        try {
          const data = JSON.parse(dataScript.textContent);
          Object.assign(reportData, data);
        } catch (e) {
          console.warn('解析 report-data 失败:', e);
        }
      }
      
      // 确保有数据再渲染
      if (!reportData.xiaohongshu || reportData.xiaohongshu.length === 0) {
        console.warn('reportData 为空，跳过渲染');
        return;
      }
      
      // Update meta
      document.getElementById('total-notes').textContent = reportData.meta.totalNotes;
      document.getElementById('ai-commerce').textContent = reportData.meta.aiCommerce;
      document.getElementById('decorative-art').textContent = reportData.meta.decorativeArt;
      document.getElementById('report-id').textContent = reportData.meta.reportId || '--';
      document.getElementById('report-time').textContent = reportData.meta.generatedAt || '--';
      document.getElementById('generated-time').textContent = reportData.meta.generatedAt || '--';
      document.getElementById('xhs-count').textContent = reportData.meta.totalNotes + ' 条';
      document.getElementById('exa-count').textContent = reportData.meta.exaCount + ' 条';
      
      // Render sections
      renderHotTopics();
      renderNotes();
      renderExaNews();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
