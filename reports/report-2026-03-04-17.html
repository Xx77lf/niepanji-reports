        return `
        <div class="xhs-card overflow-hidden cursor-pointer">
          <div class="note-cover relative">
            ${hasCover 
              ? `<a href="${noteUrl}" target="_blank" class="block">
                  <img src="${note.cover}" alt="${note.title}" class="w-full h-full object-cover" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                  <div class="absolute inset-0 bg-gradient-to-br from-red-100 to-pink-100 flex items-center justify-center">
                    <svg class="w-16 h-16 text-red-200" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                    </svg>
                  </div>
                </a>`
              : `<div class="w-full aspect-3/4 bg-gradient-to-br from-red-100 to-pink-100 flex items-center justify-center">
                  <svg class="w-16 h-16 text-red-200" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                  </svg>
                </div>`
            }
            ${hasCover ? `<a href="${noteUrl}" target="_blank" class="absolute bottom-2 right-2 px-2 py-1 bg-white/90 backdrop-blur text-xhs-red text-xs rounded-full shadow-sm hover:bg-white transition">查看原图</a>` : ''}
          </div>
          <div class="p-4">
            <h3 class="font-medium text-xhs-text mb-2 line-clamp-2 leading-snug">${note.title}</h3>
            <div class="flex items-center justify-between text-xs text-xhs-subtext mb-3">
              <span>@${note.user}</span>
              <div class="flex items-center gap-3">
                <span class="flex items-center gap-1">👍${formatNumber(parseInt(note.likes) || 0)}</span>
                <span class="flex items-center gap-1">💬${formatNumber(parseInt(note.comments) || 0)}</span>
              </div>
            </div>
            <div class="flex gap-2">
              <span class="xhs-tag">小红书</span>
              ${note.category === 'AI 电商趋势' ? '<span class="xhs-tag">AI电商</span>' : ''}
              ${note.category === '装饰画与墙艺' ? '<span class="xhs-tag">装饰画</span>' : ''}
            </div>
          </div>
        </div>
      `}).join('');
    }

    // Render Exa news (compact)
    function renderExaNews() {
      const container = document.getElementById('exa-news');
      const news = reportData.exa.slice(0, 5);
      
      container.innerHTML = news.map(item => `
        <div class="bg-white rounded-xl p-4 border border-gray-100">
          <h4 class="font-medium text-xhs-text mb-2 line-clamp-2">
            <a href="${item.url}" target="_blank" class="hover:text-xhs-red transition-colors">${item.title}</a>
          </h4>
          <p class="text-xs text-xhs-subtext line-clamp-2 mb-2">${item.snippet}</p>
          <div class="flex items-center justify-between text-xs">
            <span class="text-xhs-subtext">${item.source || 'Exa'}</span>
            <a href="${item.url}" target="_blank" class="text-xhs-red">阅读原文 →</a>
          </div>
        </div>
      `).join('');
    }

    // Render hot topics
    function renderHotTopics() {
      const container = document.getElementById('hot-topics');
      const categories = {};
      
      reportData.xiaohongshu.forEach(note => {
        const cat = note.category || '其他';
        categories[cat] = (categories[cat] || 0) + 1;
      });
      
      const sorted = Object.entries(categories).sort((a,b) => b[1] - a[1]).slice(0, 4);
      
      container.innerHTML = sorted.map(([cat, count]) => `
        <div class="bg-white rounded-xl p-4 border border-gray-100 text-center">
          <p class="text-2xl font-bold text-xhs-red mb-1">${count}</p>
          <p class="text-xs text-xhs-subtext">${cat}</p>
        </div>
      `).join('');
    }

    // Initialize
    function init() {
      // 从 <script id="report-data"> 加载数据（可选，兼容旧版）
      const dataScript = document.getElementById('report-data');
      if (dataScript) {
        try {
          const data = JSON.parse(dataScript.textContent);
          Object.assign(reportData, data);
        } catch (e) {
          console.warn('解析 report-data 失败:', e);
        }
      }
      
      // 确保有数据再渲染
      if (!reportData.xiaohongshu || reportData.xiaohongshu.length === 0) {
        console.warn('reportData 为空，跳过渲染');
        return;
      }
      
      // Update meta
      document.getElementById('total-notes').textContent = reportData.meta.totalNotes;
      document.getElementById('ai-commerce').textContent = reportData.meta.aiCommerce;
      document.getElementById('decorative-art').textContent = reportData.meta.decorativeArt;
      document.getElementById('report-id').textContent = reportData.meta.reportId || '--';
      document.getElementById('report-time').textContent = reportData.meta.generatedAt || '--';
      document.getElementById('generated-time').textContent = reportData.meta.generatedAt || '--';
      document.getElementById('xhs-count').textContent = reportData.meta.totalNotes + ' 条';
      document.getElementById('exa-count').textContent = reportData.meta.exaCount + ' 条';
      
      // Render sections
      renderHotTopics();
      renderNotes();
      renderExaNews();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
