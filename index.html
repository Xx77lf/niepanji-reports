<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>涅磐纪 AI电商日报 | 归档首页</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: 'var(--card)',
            'card-foreground': 'var(--card-foreground)',
            primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
            border: 'var(--border)',
          },
          borderRadius: { 'lg': '0.5rem', 'md': '0.375rem' },
        },
      },
    }
  </script>
  <style>
    :root {
      --background: #f8fafc;
      --foreground: #0f172a;
      --card: #ffffff;
      --card-foreground: #0f172a;
      --primary: #ef4444;
      --primary-foreground: #ffffff;
      --secondary: #f1f5f9;
      --secondary-foreground: #0f172a;
      --muted: #f1f5f9;
      --muted-foreground: #64748b;
      --accent: #f43f5e;
      --accent-foreground: #ffffff;
      --border: #e2e8f0;
    }
    .dark {
      --background: #020617;
      --foreground: #f1f5f9;
      --card: #0f172a;
      --card-foreground: #f1f5f9;
      --primary: #f43f5e;
      --primary-foreground: #0f172a;
      --secondary: #1e293b;
      --secondary-foreground: #f1f5f9;
      --muted: #1e293b;
      --muted-foreground: #94a3b8;
      --accent: #f43f5e;
      --accent-foreground: #0f172a;
      --border: #1e293b;
    }
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .hover-lift:hover { transform: translateY(-1px); }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-background text-foreground">
  <div class="min-h-screen">
    <!-- Top Bar -->
    <header class="border-b border-border bg-card/80 backdrop-blur sticky top-0 z-50">
      <div class="max-w-[1600px] mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <a href="/" class="flex items-center gap-2">
            <div class="w-7 h-7 rounded bg-primary flex items-center justify-center text-white text-xs font-bold">🔥</div>
            <div>
              <h1 class="text-sm font-bold tracking-tight">涅磐纪 AI电商日报</h1>
              <p class="text-[10px] text-muted-foreground">智能分析版</p>
            </div>
          </a>
        </div>
        <div class="flex items-center gap-4 text-xs">
          <div class="text-right">
            <div class="text-muted-foreground">自动归档</div>
          </div>
          <button id="theme-toggle" class="p-1.5 rounded hover:bg-muted transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-[1600px] mx-auto px-4 py-6">
      <!-- Stats Bar -->
      <section class="mb-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
          <div class="bg-card border border-border rounded-lg p-3">
            <div class="text-xs text-muted-foreground mb-1">资讯总数</div>
            <div class="text-2xl font-bold text-primary" id="stat-total">0</div>
          </div>
          <div class="bg-card border border-border rounded-lg p-3">
            <div class="text-xs text-muted-foreground mb-1">报告数量</div>
            <div class="text-2xl font-bold text-primary" id="total-reports">0</div>
          </div>
          <div class="bg-card border border-border rounded-lg p-3">
            <div class="text-xs text-muted-foreground mb-1">最近更新</div>
            <div class="text-2xl font-bold" id="latest-date">-</div>
          </div>
          <div class="bg-card border border-border rounded-lg p-3">
            <div class="text-xs text-muted-foreground mb-1">自动部署</div>
            <div class="text-lg font-semibold text-green-600 flex items-center gap-1">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
              GitHub Pages
            </div>
          </div>
        </div>
      </section>

      <!-- Latest Report -->
      <section class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-foreground">📰 最新报告</h2>
        </div>
        <div id="latest-report" class="bg-card border border-border rounded-2xl overflow-hidden shadow-card">
          <!-- 动态填充 -->
        </div>
      </section>

      <!-- Archives -->
      <section id="archives" class="mb-8">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-bold text-foreground">📚 历史归档</h2>
        </div>
        <div id="archives-list" class="space-y-4">
          <a href="reports/report-2026-03-04-11.html" class="block group">
              <div class="bg-card border border-border rounded-2xl p-4 sm:p-6 shadow-card hover:shadow-lg hover-lift transition-all duration-200">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="px-2.5 py-1 bg-primary/10 text-primary text-xs font-medium rounded-full">2026-03-04</span>
                      <span class="px-2.5 py-1 bg-secondary text-secondary-foreground text-xs font-medium rounded-full">11:00</span>
                    </div>
                    <h3 class="text-base sm:text-lg font-medium text-card-foreground mb-2 group-hover:text-primary transition-colors truncate">AI电商日报 2026-03-04</h3>
                    <p class="text-sm text-muted-foreground line-clamp-2">包含2026-03-04 AI电商趋势、装饰画潮流、竞品分析和行动建议。</p>
                  </div>
                  <div class="flex-shrink-0">
                    <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-secondary group-hover:bg-primary group-hover:text-white transition-all">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>
            </a>
          <a href="reports/report-2026-03-04-11.html" class="block group">
              <div class="bg-card border border-border rounded-2xl p-4 sm:p-6 shadow-card hover:shadow-lg hover-lift transition-all duration-200">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="px-2.5 py-1 bg-primary/10 text-primary text-xs font-medium rounded-full">2026-03-04</span>
                      <span class="px-2.5 py-1 bg-secondary text-secondary-foreground text-xs font-medium rounded-full">11:00</span>
                    </div>
                    <h3 class="text-base sm:text-lg font-medium text-card-foreground mb-2 group-hover:text-primary transition-colors truncate">AI电商日报 2026-03-04</h3>
                    <p class="text-sm text-muted-foreground line-clamp-2">包含2026-03-04 AI电商趋势、装饰画潮流、竞品分析和行动建议。</p>
                  </div>
                  <div class="flex-shrink-0">
                    <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-secondary group-hover:bg-primary group-hover:text-white transition-all">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>
            </a>
        </div>
      </section>

      <!-- Footer -->
      <footer class="border-t border-border pt-6 mt-8 text-center text-sm text-muted-foreground">
        <p>© 2025 涅磐纪 AI电商日报 · 自动生成并部署到 GitHub Pages</p>
      </footer>
    </main>
  </div>

  <script>
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && prefersDark)) {
      document.documentElement.classList.add('dark');
    }
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
    });

    // Load latest report preview
    fetch('reports/manifest.json')
      .then(r => r.json())
      .then(data => {
        if (data.reports && data.reports.length > 0) {
          const latest = data.reports[0];
          document.getElementById('latest-report').innerHTML = `
            <div class="p-4 sm:p-6">
              <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                <div>
                  <div class="flex items-center gap-2 mb-2">
                    <span class="px-2.5 py-1 bg-primary/10 text-primary text-xs font-medium rounded-full">${latest.date}</span>
                    <span class="px-2.5 py-1 bg-secondary text-secondary-foreground text-xs font-medium rounded-full">${latest.time}</span>
                  </div>
                  <h3 class="text-lg sm:text-xl font-bold text-card-foreground">${latest.title}</h3>
                </div>
                <a href="reports/${latest.filename}" class="px-4 py-2 bg-primary text-primary-foreground rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium">
                  查看报告 →
                </a>
              </div>
              <p class="text-muted-foreground">${latest.summary}</p>
            </div>
          `;
        }
      })
      .catch(console.error);

    // Load archives list
    fetch('reports/manifest.json')
      .then(r => r.json())
      .then(data => {
        if (data.reports && data.reports.length > 0) {
          const listHtml = data.reports.slice(0, 50).map(r => `
            <a href="reports/${r.filename}" class="block group">
              <div class="bg-card border border-border rounded-2xl p-4 sm:p-6 shadow-card hover:shadow-lg hover-lift transition-all duration-200">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                      <span class="px-2.5 py-1 bg-primary/10 text-primary text-xs font-medium rounded-full">${r.date}</span>
                      <span class="px-2.5 py-1 bg-secondary text-secondary-foreground text-xs font-medium rounded-full">${r.time}</span>
                    </div>
                    <h3 class="text-base sm:text-lg font-medium text-card-foreground mb-2 group-hover:text-primary transition-colors truncate">${r.title}</h3>
                    <p class="text-sm text-muted-foreground line-clamp-2">${r.summary}</p>
                  </div>
                  <div class="flex-shrink-0">
                    <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-secondary group-hover:bg-primary group-hover:text-white transition-all">
                      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                      </svg>
                    </span>
                  </div>
                </div>
              </div>
            </a>
          `).join('');
          document.getElementById('archives-list').innerHTML = listHtml;
          document.getElementById('total-reports').textContent = data.reports.length;
          document.getElementById('latest-date').textContent = data.reports[0].date;
        }
      })
      .catch(console.error);
  </script>
</body>
</html>
